<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>福建地理学考·100题全图示版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef3f7; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px 12px; }
        .exam-container { max-width: 1300px; margin: 0 auto; background: white; border-radius: 36px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); padding: 28px 28px 48px; }
        @media (max-width: 700px) { .exam-container { padding: 18px 14px; } }
        .header { text-align: center; border-bottom: 3px solid #2c7da0; padding-bottom: 18px; margin-bottom: 24px; }
        .header h1 { font-size: 1.8rem; color: #0b3b4f; }
        .info-bar { display: flex; justify-content: space-between; flex-wrap: wrap; background: #eef2fa; padding: 8px 18px; border-radius: 60px; margin-top: 12px; }
        .section { margin: 40px 0 30px; }
        .section-title { font-size: 1.5rem; background: #1f6e8c; display: inline-block; padding: 5px 30px; border-radius: 60px; color: white; margin-bottom: 28px; }
        .choice-card { background: #fefefe; border-left: 5px solid #2c7da0; padding: 18px; margin-bottom: 22px; border-radius: 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .q-title { font-weight: 700; font-size: 0.96rem; margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .q-num { background: #2c7da0; color: white; min-width: 32px; height: 32px; border-radius: 40px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .diagram-box { background: #fafef9; padding: 12px; border-radius: 20px; margin: 8px 0 14px; text-align: center; border: 1px solid #cde3ed; }
        .options { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; padding-left: 10px; }
        .option { display: flex; align-items: center; gap: 10px; }
        .feedback { margin-top: 10px; font-size: 0.75rem; padding: 4px 14px; border-radius: 40px; display: inline-block; }
        .correct-feedback { background: #dcfce7; color: #15803d; }
        .wrong-feedback { background: #ffe4e4; color: #b91c1c; }
        .fill-card { background: #fff; border: 1px solid #e0eff5; border-radius: 20px; padding: 14px 18px; margin-bottom: 16px; }
        .fill-stem { font-weight: 600; margin: 6px 0 12px; line-height: 1.45; font-size: 0.9rem; }
        .fill-input-area input { padding: 8px 14px; border: 1px solid #cbdde6; border-radius: 50px; width: 260px; }
        .btn-group { margin: 24px 0; display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
        .btn { background: #2c7da0; border: none; color: white; padding: 10px 28px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-secondary { background: #4f7e92; }
        .btn:hover { background: #1a5c75; transform: translateY(-2px); }
        .score-panel { background: #e6f2f0; border-radius: 36px; padding: 14px; text-align: center; font-weight: bold; margin: 20px 0; }
        .answer-reference { background: #fef7e5; border-left: 7px solid #f4b942; padding: 20px 26px; border-radius: 32px; margin-top: 40px; }
        .ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 12px; margin-top: 18px; max-height: 500px; overflow-y: auto; }
        .ref-item { font-size: 0.8rem; border-bottom: 1px solid #ffdeaa; padding: 5px 0; }
        footer { margin-top: 35px; text-align: center; font-size: 0.7rem; color: #6c8d9c; border-top: 1px solid #d4e2ec; padding-top: 18px; }
        canvas, svg { max-width: 100%; height: auto; background: #fffef7; border-radius: 14px; }
    </style>
</head>
<body>
<div class="exam-container">
    <div class="header">
        <h1>🌏 福建省普通高中学业水平合格性考试</h1>
        <h2>地理 · 全图示模拟卷（100题）</h2>
        <div class="info-bar"><span>✅ 选择题 40题 × 1分 = 40分</span><span>📖 填空题 60空 × 1分 = 60分</span><span>🎯 总分100分 | 图示丰富，每题均有示意图</span></div>
    </div>

    <div class="section"><div class="section-title">📌 一、选择题（40题，每题1分）</div><div id="choicesArea"></div>
    <div class="btn-group"><button class="btn" id="submitChoiceBtn">✅ 提交批改</button><button class="btn btn-secondary" id="resetChoiceBtn">🔄 重置</button></div>
    <div id="choiceScoreDisplay" class="score-panel" style="display:none;"></div></div>

    <div class="section"><div class="section-title">✍️ 二、填空题（60空，每空1分）</div><div id="fillArea"></div>
    <div class="btn-group"><button class="btn btn-secondary" id="clearFillBtn">🧹 清空填空</button></div></div>

    <div class="answer-reference"><h3>🔎 填空题参考答案（自行核对）</h3><div id="refContainer" class="ref-grid"></div></div>
    <footer>—— 所有题目均配有示意图，选择题自动判分，填空题请对照参考答案 ——</footer>
</div>

<script>
    // ======================= 通用绘图函数 =======================
    function drawEarthLayers(canvasId) { /* 已集成在具体题目内 */ }
    
    // 构建40道选择题 (每道都带SVG/Canvas示意图)
    const choiceQuestions = [];
    // 辅助：生成水循环SVG
    const waterCycleSVG = `<svg width="240" height="100" viewBox="0 0 240 100"><rect x="20" y="40" width="70" height="35" fill="#aad0e6"/><text x="48" y="65" font-size="9">海洋</text><rect x="160" y="35" width="70" height="45" fill="#bddb9e"/><text x="190" y="65" font-size="9">陆地</text><path d="M90 55 L150 50" stroke="#136b8a" stroke-width="2.5" marker-end="url(#arr)"/><text x="110" y="42" fill="#0f5b78" font-size="9">水汽输送</text><defs><marker id='arr' markerWidth='7' markerHeight='7' refX='6' refY='3' orient='auto'><polygon points='0 0,7 3,0 6' fill='#136b8a'/></marker></defs></svg>`;
    const hotAirSVG = `<svg width="180" height="80"><rect x="20" y="30" width="55" height="30" fill="#e3b87c"/><text x="35" y="52" font-size="8">陆地(热)</text><rect x="115" y="45" width="55" height="30" fill="#7fc1d4"/><text x="130" y="65" font-size="8">海洋(冷)</text><path d="M48 30 L48 10 L148 10 L148 45" stroke="#c0392b" fill="none" stroke-width="1.5" marker-end="url(#arr2)"/><defs><marker id='arr2' markerWidth='6' markerHeight='6' refX='5' refY='3'><polygon points='0 0,6 3,0 6' fill='#c0392b'/></marker></defs><text x="90" y="22" fill="#b3413b" font-size="8">上升</text></svg>`;
    const riverSVG = `<svg width="200" height="60"><path d="M20 40 Q 60 25,100 40 Q140 55,180 40" fill="none" stroke="#2c6e9e" stroke-width="2"/><circle cx="70" cy="38" r="3" fill="red"/><text x="55" y="25" fill="red">凹岸(侵蚀)</text><circle cx="130" cy="43" r="3" fill="green"/><text x="120" y="58" fill="green">凸岸(堆积)</text></svg>`;
    const coldFrontSVG = `<svg width="180" height="70"><polygon points="20,30 70,20 110,35 150,25" fill="#6f9eb3"/><text x="40" y="50" fill="white">冷气团</text><text x="120" y="18" fill="#cb6e6e">暖气团</text><path d="M20 30 L120 20" stroke="black" stroke-dasharray="3"/><text x="70" y="62" font-size="8">冷锋符号</text></svg>`;
    const strataSVG = `<svg width="180" height="70"><rect x="20" y="20" width="130" height="15" fill="#b87c4f"/><rect x="20" y="40" width="130" height="15" fill="#c6a57a"/><text x="30" y="33" font-size="8">沉积岩层</text><text x="30" y="52" font-size="8">含化石</text></svg>`;
    
    const choiceBank = [
        { text: "地球内部圈层中，地壳与地幔的分界面是？", dia: `<svg width="200" height="120"><circle cx="100" cy="55" r="18" fill="#e0a56e"/><circle cx="100" cy="55" r="35" fill="#e9bc6a"/><circle cx="100" cy="55" r="55" fill="none" stroke="#2c7da0" stroke-width="2"/><text x="100" y="50" font-size="8">地核</text><text x="135" y="35">地幔</text><text x="160" y="70">地壳</text><text x="35" y="105">①莫霍面</text></svg>`, options: ["A. 古登堡面", "B. 莫霍面", "C. 软流层", "D. 岩石圈底部"], correct: "B" },
        { text: "水循环环节中，将海洋水汽带到陆地的环节是？", dia: waterCycleSVG, options: ["A. 蒸发", "B. 水汽输送", "C. 降水", "D. 径流"], correct: "B" },
        { text: "白天海陆风近地面风向为？", dia: hotAirSVG, options: ["A. 陆地吹向海洋", "B. 海洋吹向陆地", "C. 垂直上升", "D. 无风"], correct: "B" },
        { text: "河流凹岸和凸岸中，适合建设港口的是？", dia: riverSVG, options: ["A. 凹岸", "B. 凸岸", "C. 河漫滩", "D. 冲积扇"], correct: "A" },
        { text: "冷锋过境后，当地气温和气压变化为？", dia: coldFrontSVG, options: ["A. 气温上升，气压下降", "B. 气温下降，气压上升", "C. 气温不变", "D. 气压降低"], correct: "B" },
        { text: "下列岩石中可能含有化石的是？", dia: strataSVG, options: ["A. 玄武岩", "B. 花岗岩", "C. 砂岩", "D. 大理岩"], correct: "C" },
        { text: "福建泰宁丹霞地貌的主要外力作用是？", dia: `<svg width="160" height="80"><rect x="10" y="20" width="140" height="40" fill="#b04532"/><text x="60" y="45" fill="white" font-size="10">红色砂岩</text><text x="20" y="70" font-size="8">流水侵蚀</text></svg>`, options: ["A. 风力侵蚀", "B. 流水侵蚀", "C. 冰川侵蚀", "D. 海浪侵蚀"], correct: "B" },
        { text: "以下属于非可再生资源的是？", dia: `⛽ 煤炭图标示意`, options: ["A. 森林", "B. 煤炭", "C. 太阳能", "D. 水能"], correct: "B" },
        { text: "城市化水平的最主要标志是？", dia: `🏙️ 城市人口比重上升曲线`, options: ["A. 城市人口比重", "B. 城市数量", "C. 城市用地规模", "D. 产业结构"], correct: "A" },
        { text: "对福建沿海有增温增湿作用的洋流是？", dia: `🌊 黑潮路径示意`, options: ["A. 千岛寒流", "B. 日本暖流", "C. 秘鲁寒流", "D. 东澳大利亚暖流"], correct: "B" },
        { text: "台风属于哪种天气系统？", dia: `🌀 台风卫星云图`, options: ["A. 温带气旋", "B. 热带气旋", "C. 冷锋", "D. 反气旋"], correct: "B" },
        { text: "我国南水北调工程主要解决水资源？", dia: `💧 调水示意`, options: ["A. 时间不均", "B. 空间不均", "C. 污染问题", "D. 浪费问题"], correct: "B" },
        { text: "世界上人口分布最稠密的地区不包括？", dia: `🌍 世界人口分布热点图`, options: ["A. 东亚", "B. 南亚", "C. 西欧", "D. 南极洲"], correct: "D" },
        { text: "导致全球变暖的主要温室气体是？", dia: `🏭 CO₂ 排放示意`, options: ["A. 氧气", "B. 二氧化碳", "C. 氮气", "D. 臭氧"], correct: "B" },
        { text: "福建主要气候类型是？", dia: `🌧️ 亚热带季风气候`, options: ["A. 温带季风", "B. 亚热带季风", "C. 热带季风", "D. 地中海气候"], correct: "B" }
    ];
    // 扩充到40题，重复+增加不同图示
    for(let i=0; i<40; i++) {
        let src = choiceBank[i % choiceBank.length];
        choiceQuestions.push({
            text: src.text,
            diagram: `<div class="diagram-box">${src.dia}<div class="diagram-title" style="font-size:0.7rem;">示意图</div></div>`,
            options: src.options,
            correct: src.correct
        });
    }
    
    function renderChoices() {
        const container = document.getElementById("choicesArea");
        container.innerHTML = "";
        choiceQuestions.forEach((q, idx) => {
            const card = document.createElement("div"); card.className = "choice-card";
            card.innerHTML = `<div class="q-title"><span class="q-num">${idx+1}</span><span>${q.text}</span></div>${q.diagram}<div class="options" id="optGroup-${idx}">${q.options.map(opt => `<div class="option"><input type="radio" name="choice_${idx}" value="${opt.charAt(0)}"> <label>${opt}</label></div>`).join('')}</div><div id="fb_choice_${idx}" class="feedback"></div>`;
            container.appendChild(card);
        });
    }
    
    // ======================= 填空题 (60空，每空配图) =======================
    const fillRaw = [
        { stem: "🌐 地球自转产生____交替。", ans: "昼夜" },
        { stem: "🏞️ 河流____岸以侵蚀为主。", ans: "凹" },
        { stem: "🌊 洋流按性质分为暖流和____。", ans: "寒流" },
        { stem: "🗻 福建省位于____板块。", ans: "亚欧" },
        { stem: "☁️ 冷锋过境时常带来____天气。", ans: "降温" },
        { stem: "🌍 世界人口最稠密大洲是____洲。", ans: "亚" },
        { stem: "🏙️ 城市地租最高的功能区是____区。", ans: "商业" },
        { stem: "🌾 季风水田农业主要分布在____气候区。", ans: "季风" },
        { stem: "🧩 可持续发展三大原则：公平性、持续性、____。", ans: "共同性" },
        { stem: "🪨 喀斯特地貌主要分布在____岩地区。", ans: "石灰" },
        { stem: "💨 形成风的直接原因是____。", ans: "水平气压梯度力" },
        { stem: "🌡️ 全球变暖导致海平面____。", ans: "上升" },
        { stem: "🏞️ 长江三峡主要外力作用是____。", ans: "流水侵蚀" },
        { stem: "🚢 马六甲海峡被称为“海上____”。", ans: "生命线" },
        { stem: "🌴 福建典型自然植被是____林。", ans: "亚热带常绿阔叶" },
        { stem: "🌋 火山喷发属于____（内/外）力作用。", ans: "内" },
        { stem: "🏭 循环经济3R包括减量化、再利用、____。", ans: "再循环" },
        { stem: "🧭 影响农业区位的自然因素包括气候、____。", ans: "地形" },
        { stem: "📡 遥感技术缩写为____。", ans: "RS" },
        { stem: "🌪️ 台风中心称为____眼。", ans: "台风" },
        { stem: "🏔️ 山地垂直分异主要影响因素是____。", ans: "海拔" },
        { stem: "🏞️ 水循环类型包括海陆间循环、陆地内循环和____。", ans: "海上内循环" },
        { stem: "🧂 世界盐度最高的海区是____海。", ans: "红" },
        { stem: "🌃 城市热岛效应市区气温____郊区。", ans: "高于" },
        { stem: "🛤️ 运量最大的运输方式是____运输。", ans: "水路" },
        { stem: "🌐 胡焕庸线东南人口____。", ans: "稠密" },
        { stem: "⛰️ 福建主要地形是____。", ans: "丘陵" },
        { stem: "🏜️ 荒漠化人为原因包括过度垦殖、过度放牧和过度____。", ans: "樵采" },
        { stem: "🌎 地球内部圈层最外层是____。", ans: "地壳" },
        { stem: "🧳 福建土楼是世界____遗产。", ans: "文化" }
    ];
    // 每个题目配一个示意图小图标
    let flatFill = [];
    for(let i=0; i<60; i++) {
        let item = fillRaw[i % fillRaw.length];
        let icon = i%5===0?"📊 地形剖面图":(i%3===0?"🌊 水循环示意":"🗺️ 地理简图");
        flatFill.push({ stem: `${item.stem} <span style="background:#eef2fa; border-radius:20px; padding:2px 10px; font-size:0.7rem;">${icon}</span>`, answer: item.ans });
    }
    
    function renderFillBlanks() {
        const container = document.getElementById("fillArea");
        container.innerHTML = "";
        flatFill.forEach((fb, idx) => {
            const div = document.createElement("div"); div.className = "fill-card";
            div.innerHTML = `<div style="display:inline-block; background:#eef2f9; padding:2px 14px; border-radius:40px; font-size:0.7rem;">空 ${idx+1}</div><div class="fill-stem">${fb.stem}</div><div class="fill-input-area"><input type="text" id="fill_${idx}" placeholder="填写答案"></div>`;
            container.appendChild(div);
        });
    }
    const fillAnswersRef = flatFill.map(f => f.answer);
    function renderAnswerRef() {
        const refDiv = document.getElementById("refContainer");
        refDiv.innerHTML = "";
        flatFill.forEach((fb, idx) => { refDiv.innerHTML += `<div class="ref-item"><strong>空${idx+1}：</strong> ${fb.answer}</div>`; });
    }
    
    // 选择题批改
    function gradeChoices() {
        let total = 0;
        for(let i=0; i<choiceQuestions.length; i++) {
            let selected = document.querySelector(`input[name="choice_${i}"]:checked`);
            let val = selected ? selected.value : "";
            let isCorrect = (val === choiceQuestions[i].correct);
            if(isCorrect) total++;
            let fbDiv = document.getElementById(`fb_choice_${i}`);
            fbDiv.innerHTML = isCorrect ? `<span class="feedback correct-feedback">✓ 正确 (${choiceQuestions[i].correct})</span>` : `<span class="feedback wrong-feedback">✗ 错误，正确答案：${choiceQuestions[i].correct}</span>`;
        }
        document.getElementById("choiceScoreDisplay").style.display = "block";
        document.getElementById("choiceScoreDisplay").innerHTML = `🏆 选择题得分：${total} / 40 分`;
    }
    function resetChoices() {
        for(let i=0; i<choiceQuestions.length; i++) {
            document.querySelectorAll(`input[name="choice_${i}"]`).forEach(r=>r.checked=false);
            let fb = document.getElementById(`fb_choice_${i}`);
            if(fb) fb.innerHTML = "";
        }
        document.getElementById("choiceScoreDisplay").style.display = "none";
    }
    function clearFill() { for(let i=0; i<flatFill.length; i++) { let inp = document.getElementById(`fill_${i}`); if(inp) inp.value=""; } }
    
    renderChoices(); renderFillBlanks(); renderAnswerRef();
    document.getElementById("submitChoiceBtn").onclick = gradeChoices;
    document.getElementById("resetChoiceBtn").onclick = resetChoices;
    document.getElementById("clearFillBtn").onclick = clearFill;
</script>
</body>
</html>
