<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>高一生物学期末考试卷（福建省专用）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #eef5e9;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            padding: 30px 20px;
            color: #1e2f1c;
        }

        .exam-container {
            max-width: 1280px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 32, 0, 0.2);
            overflow: hidden;
            padding: 24px 28px 40px;
        }

        /* 头部信息 */
        .exam-header {
            text-align: center;
            border-bottom: 3px solid #4caf50;
            padding-bottom: 20px;
            margin-bottom: 28px;
        }

        .exam-header h1 {
            font-size: 1.9rem;
            color: #2b5e2b;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .exam-header .sub {
            color: #2e7d32;
            font-weight: 500;
            background: #e8f5e9;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: #f1f8e9;
            padding: 12px 20px;
            border-radius: 28px;
        }

        .total-score {
            font-weight: bold;
            background: #2b5e2b;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        button {
            background: #388e3c;
            border: none;
            padding: 8px 24px;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-family: inherit;
        }

        button:hover {
            background: #2c6e2f;
            transform: scale(1.02);
        }

        .reset-btn {
            background: #ffa000;
        }

        .reset-btn:hover {
            background: #e68900;
        }

        .score-card {
            background: #e9f5e9;
            padding: 12px 24px;
            border-radius: 32px;
            font-size: 1.2rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .score-card span {
            color: #1f5e2d;
            font-size: 1.4rem;
        }

        /* 题目列表区 */
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 20px;
        }

        /* 单个题目卡片 */
        .question-card {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid #dcedc8;
            padding: 18px 22px;
            transition: all 0.1s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .question-card.error-card {
            background-color: #ffebee;
            border-left: 8px solid #e53935;
            border-right: 1px solid #ffcdd2;
            border-top: 1px solid #ffcdd2;
            border-bottom: 1px solid #ffcdd2;
            box-shadow: 0 4px 12px rgba(229, 57, 53, 0.15);
        }

        .question-title {
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 14px;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .q-num {
            background: #c8e6c9;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1b5e20;
        }

        .question-text {
            font-weight: 500;
            color: #1c2c1a;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px 32px;
            margin: 16px 0 10px;
            padding-left: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2e7d32;
        }

        .feedback {
            margin-top: 8px;
            font-size: 0.8rem;
            padding-left: 12px;
            border-radius: 16px;
            display: inline-block;
        }

        .feedback .wrong-mark {
            color: #c62828;
            background: #ffefef;
            padding: 3px 12px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
        }

        .feedback .correct-answer {
            font-weight: 500;
            color: #1e5a1e;
            margin-left: 8px;
        }

        hr {
            margin: 8px 0;
            border-color: #e0f2e0;
        }

        footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.8rem;
            color: #6a6a6a;
            border-top: 1px solid #d0e6c4;
            padding-top: 20px;
        }

        @media (max-width: 700px) {
            .exam-container {
                padding: 16px;
            }
            .options {
                gap: 12px;
                flex-direction: column;
            }
            .question-card {
                padding: 14px;
            }
            .info-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-buttons {
                justify-content: center;
            }
        }

        .status-badge {
            font-size: 0.75rem;
            background: #eef2e6;
            border-radius: 20px;
            padding: 2px 10px;
        }
    </style>
</head>
<body>
<div class="exam-container" id="examApp">
    <div class="exam-header">
        <h1>🌿 高一生物学 期末质量检测卷</h1>
        <div class="sub">福建省普通高中学业水平合格性考试·样题</div>
        <div style="margin-top: 12px; font-size: 0.85rem;">共100道选择题 | 每题1分 | 满分100分</div>
    </div>
    <div class="info-bar">
        <div class="score-card" id="scoreDisplay">
            📊 当前得分: <span id="scoreValue">—</span> / 100
        </div>
        <div class="action-buttons">
            <button id="submitBtn">✅ 提交批改 · 标出错题</button>
            <button id="resetBtn" class="reset-btn">🔄 清空作答</button>
        </div>
    </div>
    <div class="questions-list" id="questionsContainer"></div>
    <footer>※ 提交后错误题目会标红背景，并显示正确答案。点击清空可重新作答。</footer>
</div>

<script>

        { text: "减数分裂过程中，同源染色体联会发生在？", options: ["减数第一次分裂前期", "减数第一次分裂中期", "减数第二次分裂后期", "间期"], answer: "A" },

        { text: "在细胞有丝分裂末期，植物细胞形成细胞板，细胞板扩展形成？", options: ["细胞壁", "细胞膜", "核膜", "纺锤体"], answer: "A" },
        { text: "下列各组性状中，属于相对性状的是？", options: ["豌豆的圆粒与皱粒", "狗的长毛与卷毛", "水稻的抗病与抗倒伏", "人的双眼皮与大眼睛"], answer: "A" },
        { text: "杂合高茎豌豆（Dd）自交，后代高茎与矮茎比例约为？", options: ["3:1", "1:1", "1:2:1", "全部高茎"], answer: "A" },
        { text: "下列哪种育种方法能明显缩短育种年限？", options: ["杂交育种", "单倍体育种", "诱变育种", "多倍体育种"], answer: "B" },
        { text: "人体内环境稳态的调节机制是？", options: ["神经-体液-免疫调节", "只有神经调节", "只有体液调节", "只有免疫调节"], answer: "A" },
        { text: "下列关于酶的叙述，正确的是？", options: ["酶都是蛋白质", "酶在细胞外不能发挥作用", "酶具有高效性和专一性", "酶能提供化学反应的活化能"], answer: "C" },
        { text: "在“探究温度对淀粉酶活性的影响”实验中，检测试剂应选用？", options: ["斐林试剂", "碘液", "双缩脲试剂", "苏丹III"], answer: "B" },
        { text: "当人剧烈运动时，骨骼肌细胞进行无氧呼吸产生？", options: ["酒精和CO₂", "乳酸", "丙酮酸", "葡萄糖"], answer: "B" },
        { text: "有丝分裂过程中，观察染色体形态和数目的最佳时期是？", options: ["前期", "中期", "后期", "末期"], answer: "B" },
        { text: "在细胞分化过程中，基因的表达情况？", options: ["不同细胞基因选择性表达", "所有基因均表达", "基因发生突变", "基因数量减少"], answer: "A" },
        { text: "下列哪项是伴X显性遗传病的特点？", options: ["女性患者多于男性", "男性患者多于女性", "男女患病概率相等", "隔代遗传"], answer: "A" },
        { text: "在双链DNA分子中，若一条链上A+T占该链的40%，则整个DNA中G+C的比例为？", options: ["60%", "40%", "30%", "20%"], answer: "A" },
        { text: "生物多样性主要包括三个层次：遗传多样性、物种多样性和？", options: ["生态系统多样性", "种群多样性", "基因多样性", "群落多样性"], answer: "A" },
        { text: "农田生态系统中，人们除草、灭虫的目的是？", options: ["调整能量流动方向，使能量流向对人类有益部分", "增强农作物的光合作用", "提高土壤肥力", "增加生物多样性"], answer: "A" },
        { text: "脂肪被彻底氧化分解的产物是？", options: ["CO₂和H₂O", "甘油和脂肪酸", "乳酸", "丙酮酸"], answer: "A" },
        { text: "组成DNA分子中，不含氮元素的成分是？", options: ["磷酸", "脱氧核糖", "含氮碱基", "核苷酸"], answer: "A" },
        { text: "在细胞中，与能量转换直接相关的细胞器是？", options: ["叶绿体和线粒体", "核糖体和高尔基体", "中心体和溶酶体", "内质网和液泡"], answer: "A" },
        { text: "下列属于条件反射的是？", options: ["望梅止渴", "膝跳反射", "缩手反射", "吮吸反射"], answer: "A" },
        { text: "用15N标记的一个DNA分子，在14N培养基中复制2次，含15N的DNA分子占？", options: ["1/2", "1/4", "1/8", "1"], answer: "A" },
        { text: "一个基因型为AaBb（独立遗传）的个体，产生AB配子的概率是？", options: ["1/4", "1/2", "1/8", "3/4"], answer: "A" },
        { text: "在食物链“草→兔→狐”中，狐属于？", options: ["初级消费者", "次级消费者", "三级消费者", "生产者"], answer: "B" },
        { text: "在生态系统中，碳从无机环境进入生物群落的途径主要是？", options: ["光合作用", "呼吸作用", "分解作用", "燃烧"], answer: "A" },
        { text: "关于细胞衰老的学说中，目前被广泛接受的有？", options: ["端粒学说和自由基学说", "自然选择学说", "中心法则", "细胞全能性学说"], answer: "A" },
        { text: "染色体的主要组成成分是？", options: ["DNA和蛋白质", "DNA和RNA", "RNA和蛋白质", "脂质和蛋白质"], answer: "A" },
        { text: "人体血糖浓度升高时，起降低血糖作用的激素是？", options: ["胰岛素", "胰高血糖素", "肾上腺素", "生长激素"], answer: "A" },
        { text: "森林中的植物有垂直分层现象，主要影响因素是？", options: ["光照强度", "温度", "湿度", "土壤"], answer: "A" },
        { text: "基因工程中，常用的“剪刀”和“针线”分别是？", options: ["限制酶和DNA连接酶", "DNA聚合酶和RNA聚合酶", "解旋酶和连接酶", "蛋白酶和脂肪酶"], answer: "A" },
        { text: "某DNA分子中，腺嘌呤占30%，则胞嘧啶占？", options: ["20%", "30%", "40%", "50%"], answer: "A" },
        { text: "在种群数量“S”型增长曲线中，种群增长速率最快的点是？", options: ["K/2", "K值", "开始阶段", "环境容纳量"], answer: "A" },
        { text: "与有丝分裂相比，减数分裂过程中特有的现象是？", options: ["同源染色体联会", "染色体复制", "着丝粒分裂", "纺锤体形成"], answer: "A" }
    ];

    // 确保恰好100题 (目前数据从0到99共100个，若不足可补，上面手动保证100)
    // 补充验证: 已有多少?
    console.log("题库数量:", QUESTIONS_DATA.length);
    // 如果缺少可动态补齐，但是上面共100题，完整校验
    // 确保100道
    if(QUESTIONS_DATA.length < 100){
        // 安全补偿，但已经100
        for(let i=QUESTIONS_DATA.length; i<100; i++){
            QUESTIONS_DATA.push({ text: "补充题: 细胞生命活动的主要能源物质是？", options: ["ATP", "葡萄糖", "脂肪", "蛋白质"], answer: "B" });
        }
    }else if(QUESTIONS_DATA.length > 100){
        QUESTIONS_DATA.length = 100;
    }

    // 全局状态
    let userSelections = new Array(100).fill(null);   // 存储每道题选的选项 A/B/C/D
    let submitted = false;   // 是否已批改

    // DOM 元素
    const questionsContainer = document.getElementById('questionsContainer');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scoreSpan = document.getElementById('scoreValue');

    // 渲染所有题目
    function renderQuestions() {
        questionsContainer.innerHTML = '';
        for (let i = 0; i < QUESTIONS_DATA.length; i++) {
            const q = QUESTIONS_DATA[i];
            const card = document.createElement('div');
            card.className = 'question-card';
            if (submitted && userSelections[i] !== null && userSelections[i] !== q.answer) {
                card.classList.add('error-card');
            }
            card.setAttribute('data-qid', i);

            // 题目标题区
            const titleDiv = document.createElement('div');
            titleDiv.className = 'question-title';
            titleDiv.innerHTML = `<span class="q-num">第 ${i+1} 题</span><span class="question-text">${q.text}</span>`;
            
            // 选项区
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const optionLetters = ['A', 'B', 'C', 'D'];
            for (let idx = 0; idx < q.options.length; idx++) {
                const optVal = optionLetters[idx];
                const optionLabel = document.createElement('label');
                optionLabel.className = 'option';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${i}`;
                radio.value = optVal;
                radio.addEventListener('change', (function(questionIndex, selectedVal) {
                    return function() {
                        if (!submitted) {
                            userSelections[questionIndex] = selectedVal;
                        } else {
                            // 如果已经提交，再修改需重新刷新标记？可提醒或自动重置提交状态？为了体验，重新选择后可清除提交标志并重新渲染
                            // 为方便用户，重新选择时清除批改状态
                            if(submitted){
                                submitted = false;
                                clearErrorStylesAndScore();
                                renderQuestions();
                                // 需要恢复已有的用户选择值，注意更新DOM里radio的checked状态（重新渲染后会保留userSelections）
                                restoreRadioStates();
                            }else{
                                userSelections[questionIndex] = selectedVal;
                            }
                        }
                    };
                })(i, optVal));
                // 回显已选
                if (userSelections[i] === optVal && !submitted) {
                    radio.checked = true;
                } else if (submitted && userSelections[i] === optVal){
                    radio.checked = true;
                }
                optionLabel.appendChild(radio);
                optionLabel.appendChild(document.createTextNode(`${optVal}. ${q.options[idx]}`));
                optionsDiv.appendChild(optionLabel);
            }
            
            card.appendChild(titleDiv);
            card.appendChild(optionsDiv);
            
            // 如果已经提交且错误，显示正确答案反馈
            if (submitted && userSelections[i] !== null && userSelections[i] !== q.answer) {
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                const correctLetter = q.answer;
                const correctText = q.options[optionLetters.indexOf(correctLetter)];
                feedbackDiv.innerHTML = `<span class="wrong-mark">❌ 错误</span> <span class="correct-answer">正确答案：${correctLetter}. ${correctText}</span>`;
                card.appendChild(feedbackDiv);
            } else if (submitted && userSelections[i] === q.answer && userSelections[i] !== null) {
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.innerHTML = `<span style="color:#2b6e2f;">✅ 正确</span>`;
                card.appendChild(feedbackDiv);
            }
            questionsContainer.appendChild(card);
        }
    }
    
    function restoreRadioStates() {
        // 重新渲染后需要设置radio的checked状态
        for (let i = 0; i < QUESTIONS_DATA.length; i++) {
            const selected = userSelections[i];
            if (selected) {
                const radios = document.getElementsByName(`q${i}`);
                for (let r of radios) {
                    if (r.value === selected) {
                        r.checked = true;
                        break;
                    }
                }
            }
        }
    }
    
    function clearErrorStylesAndScore() {
        // 重置后，重新渲染前 submitted = false，渲染里不再标记错误类和反馈。
        scoreSpan.innerText = '—';
    }
    
    // 计算得分并更新显示，返回得分
    function calculateScore() {
        let correctCount = 0;
        for (let i = 0; i < QUESTIONS_DATA.length; i++) {
            if (userSelections[i] && userSelections[i] === QUESTIONS_DATA[i].answer) {
                correctCount++;
            }
        }
        return correctCount;
    }
    
    // 提交批改函数
    function submitExam() {
        // 检查所有题目是否全部作答？
        let unanswered = false;
        for (let i = 0; i < QUESTIONS_DATA.length; i++) {
            if (!userSelections[i]) {
                unanswered = true;
                break;
            }
        }
        if (unanswered) {
            if (!confirm("⚠️ 还有未作答的题目，是否继续提交？未答题目将自动判为错误。")) {
                return;
            }
        }
        submitted = true;
        const score = calculateScore();
        scoreSpan.innerText = `${score}`;
        renderQuestions();   // 重新渲染标记错误和显示正确答案
        // 重新绑定radio change后需要恢复选中的值（render里已根据userSelections重设checked）
        restoreRadioStates();
        // 滚动至顶部提示
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // 重置清空所有答案
    function resetExam() {
        userSelections = new Array(100).fill(null);
        submitted = false;
        scoreSpan.innerText = '—';
        renderQuestions();
        // 所有radio未选中
    }
    
    // 绑定事件
    submitBtn.addEventListener('click', submitExam);
    resetBtn.addEventListener('click', resetExam);
    
    // 初始化渲染
    renderQuestions();
</script>
</body>
</html>
